<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Proyecto Flexbox</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Arial, sans-serif;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#333;
    color:white;
    padding:15px 20px;
}

.links{
    display:flex;
    gap:20px;
}

.cta{
    padding:8px 15px;
    border:none;
    background:#00bcd4;
    color:white;
    border-radius:5px;
}

/* CONTENIDO PRINCIPAL */
.wrapper{
    flex:1;
    display:flex;
}

.sidebar{
    flex:1;
    background:#d9edf7;
    padding:20px;
}

.contenido{
    flex:3;
    background:#f5f5f5;
    padding:20px;
}

.panel{
    flex:1;
    background:#fcf8e3;
    padding:20px;
}

/* FOOTER */
.footer{
    display:flex;
    background:#333;
    color:white;
}

.footer div{
    flex:1;
    padding:20px;
    text-align:center;
    border:1px solid #555;
}
</style>
</head>

<body>

    <nav class="navbar">
        <div>LOGO</div>

        <div class="links">
            <span>Inicio</span>
            <span>Servicios</span>
            <span>Contacto</span>
        </div>

        <button class="cta">CTA</button>
    </nav>

    <main class="wrapper">
        <aside class="sidebar">
            SIDEBAR (flex:1)
        </aside>

        <section class="contenido">
            CONTENIDO (flex:3)
        </section>

        <aside class="panel">
            PANEL (flex:1)
        </aside>
    </main>

    <footer class="footer">
        <div>Columna 1</div>
        <div>Columna 2</div>
        <div>Columna 3</div>
    </footer>

</body>
</html>
